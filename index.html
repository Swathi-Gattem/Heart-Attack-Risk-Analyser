<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️Heart Disease Risk Analyzer</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="container">

   <div class="header">

    <div class="logo">
        <i class="fa-solid fa-heart-pulse"></i>
        <h1>Heart Disease Risk Analyzer</h1>
    </div>

    <p class="subtitle">
        AI Powered Cardiovascular Risk Assessment
    </p>

</div>
</div>

    <div class="dashboard">

        <div class="form-card">

            <h2>Patient Information</h2>

            <form id="predictForm">

                <div class="input-group">
                    <label>Age</label>
                    <input type="number" id="age" required>
                </div>

                <div class="input-group">
                    <label>Gender</label>
                    <select id="sex">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Resting Blood Pressure</label>
                    <input type="number" id="bp" required>
                </div>

                <div class="input-group">
                    <label>Cholesterol</label>
                    <input type="number" id="chol" required>
                </div>

                <div class="input-group">
                    <label>Max Heart Rate</label>
                    <input type="number" id="hr" required>
                </div>

                <button type="submit">
                    Predict Risk
                </button>

            </form>

        </div>

        <div class="result-card">

            <h2>Risk Assessment</h2>

            <div class="gauge-container">
                <canvas id="riskChart"></canvas>
            </div>

            <h1 id="riskPercentage">0%</h1>

            <div id="riskStatus" class="status low">
                Low Risk
            </div>

            <div id="recommendation">

<div class="recommend-card">
    🏃 Regular Exercise
</div>

<div class="recommend-card">
    🥗 Healthy Diet
</div>

<div class="recommend-card">
    ❤️ Monitor BP
</div>

<div class="recommend-card">
    📅 Regular Checkups
</div>

</div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
